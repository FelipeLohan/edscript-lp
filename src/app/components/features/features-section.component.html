<section
  class="py-section bg-aura-navy overflow-hidden"
  id="features"
  aria-labelledby="features-heading"
>
  <div class="max-w-6xl mx-auto px-6 md:px-12">
    <!-- Header -->
    <div class="text-center mb-16">
      <p class="font-body text-aura-electric text-xs uppercase tracking-widest font-semibold mb-3">
        Diferente Por Natureza
      </p>
      <h2 id="features-heading" class="section-title text-4xl md:text-6xl mb-4">
        Por Que a Aura Vence
      </h2>
      <p class="font-body text-aura-muted text-lg max-w-xl mx-auto">
        Tudo que um apostador sério precisa. Nada que um casual espera.
      </p>
    </div>

    <!-- Asymmetric feature grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (item of features; track trackByFeature($index, item); let i = $index) {
        <div
          #cardEl
          class="opacity-0"
          [class.md:col-span-2]="i === 0"
        >
          <aura-card [glow]="item.accentColor === 'amber' ? 'amber' : 'blue'" padding="lg">
            <div class="flex flex-col gap-4">
              <div class="flex items-start justify-between gap-4 flex-wrap">
                <h3 class="font-display text-white text-2xl md:text-3xl uppercase tracking-wide">
                  {{ item.title }}
                </h3>
                @if (item.metric) {
                  <span
                    class="data-value text-lg md:text-2xl font-bold flex-shrink-0"
                    [style.color]="item.accentColor === 'amber' ? '#22c55e' : '#3b82f6'"
                  >
                    {{ item.metric }}
                  </span>
                }
              </div>
              <p class="font-body text-aura-muted leading-relaxed" [class.text-base]="i !== 0" [class.text-lg]="i === 0">
                {{ item.description }}
              </p>
            </div>
          </aura-card>
        </div>
      }
    </div>
  </div>
</section>
