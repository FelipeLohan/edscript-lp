<section
  class="py-section bg-aura-navy overflow-hidden"
  id="how-it-works"
  aria-labelledby="hiw-heading"
>
  <div class="max-w-6xl mx-auto px-6 md:px-12">
    <!-- Section header -->
    <div class="text-center mb-16">
      <p class="font-body text-aura-accent text-xs uppercase tracking-widest font-semibold mb-3">
        A Tecnologia
      </p>
      <h2 id="hiw-heading" class="section-title text-4xl md:text-6xl mb-4">
        Como Funciona
      </h2>
      <p class="font-body text-aura-muted text-lg max-w-xl mx-auto">
        Do dado bruto à sua previsão em menos de 200ms.
      </p>
    </div>

    <!-- Steps -->
    <div class="relative">
      <!-- Connecting line (desktop only) -->
      <div
        class="hidden md:block absolute top-10 left-0 right-0 h-px"
        style="background: linear-gradient(90deg, transparent 0%, rgba(34,197,94,0.3) 20%, rgba(34,197,94,0.3) 80%, transparent 100%);"
        aria-hidden="true"
      ></div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-10 md:gap-8">
        @for (step of steps; track trackByStep($index, step)) {
          <div
            #stepEl
            class="opacity-0 flex flex-col items-center text-center gap-5"
          >
            <!-- Step number circle -->
            <div
              class="relative z-10 flex items-center justify-center w-20 h-20 rounded-full border-2 border-aura-accent flex-shrink-0"
              style="background-color: rgba(34,197,94,0.08);"
            >
              <span class="data-value text-aura-accent text-2xl font-bold">
                0{{ step.stepNumber }}
              </span>
            </div>

            <!-- Step icon placeholder -->
            <div
              class="w-10 h-10 rounded-lg flex items-center justify-center"
              style="background-color: rgba(34,197,94,0.1);"
              aria-hidden="true"
            >
              @switch (step.iconName) {
                @case ('database') {
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
                    <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
                  </svg>
                }
                @case ('cpu') {
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                    <rect x="9" y="9" width="6" height="6"/>
                    <path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/>
                  </svg>
                }
                @case ('target') {
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="6"/>
                    <circle cx="12" cy="12" r="2"/>
                  </svg>
                }
              }
            </div>

            <!-- Text content -->
            <div class="flex flex-col gap-2">
              <h3 class="font-display text-white text-xl uppercase tracking-wide">
                {{ step.title }}
              </h3>
              <p class="font-body text-aura-muted text-sm leading-relaxed">
                {{ step.description }}
              </p>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
